<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>vizmat: a cross platform crystal visualizer</title>
    <style>
      html, body {
        width: 100%;
        height: 100%;
      }
      body {
        margin: 0;
        font-family: sans-serif;
        overflow: hidden;
        background: #020710;
      }
      h1 {
        position: fixed;
        top: 8px;
        left: 12px;
        margin: 0;
        z-index: 10;
        color: #ffffff;
        font-size: 1rem;
        text-shadow: 0 1px 8px rgba(0, 0, 0, 0.7);
      }
      header {
        position: fixed;
        top: 8px;
        right: 12px;
        z-index: 10;
        display: flex;
        align-items: center;
        padding: 0.35rem 0.6rem;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 6px 24px rgba(0, 0, 0, 0.22);
      }
      header h1 {
        font-size: 0.5rem; /* smaller than before */
        font-weight: 500;
        margin: 0;
        font-family: 'Roboto', sans-serif;
        letter-spacing: 0.5px; /* subtle style */
      }
      header a {
        color: black;
        text-decoration: none;
        display: flex;
        align-items: center;
      }
      header a img {
        height: 24px;
        margin-left: 0.5rem;
      }
      canvas {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        display: block;
      }
    </style>
  </head>
  <body>
    <link
    data-trunk rel="rust"
    href="Cargo.toml"
    data-wasm-opt="z"
    data-wasm-opt-params="--enable-bulk-memory --enable-nontrapping-float-to-int"
    data-bin="vizmat-app"
    data-cargo-no-default-features="true" />
    <link data-trunk rel="copy-dir" href="assets" />
    <h1>molecule🧬/crystal🧊 visualizer go brrr 👀</h1>
    <header>
      <a href="https://github.com/rs4rse/vizmat" target="_blank">
        like me ──★ ˙🍓 ̟ !!
        <img src="https://img.shields.io/github/stars/rs4rse/vizmat" alt="GitHub stars">
      </a>
    </header>
    <canvas id="bevy-canvas"></canvas>
    <script type="module" src="./index.js"></script>
  </body>
</html>
