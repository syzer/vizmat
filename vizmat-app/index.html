<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>vizmat: a cross platform crystal visualizer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg: #030812;
        --bg-soft: rgba(9, 17, 30, 0.72);
        --bg-soft-strong: rgba(8, 16, 28, 0.88);
        --text: #edf4ff;
        --text-dim: #afc0d8;
        --line: rgba(255, 255, 255, 0.16);
        --accent: #3dd2ff;
        --accent-soft: rgba(61, 210, 255, 0.18);
      }
      html, body {
        width: 100%;
        height: 100%;
      }
      body {
        margin: 0;
        font-family: "Space Grotesk", "Avenir Next", "Segoe UI", sans-serif;
        overflow: hidden;
        background: radial-gradient(120% 120% at 50% 10%, #0c1930 0%, var(--bg) 58%, #01040a 100%);
      }
      .site-title {
        position: fixed;
        top: 12px;
        left: 12px;
        margin: 0;
        z-index: 40;
        color: var(--text);
        font-size: clamp(0.9rem, 1.8vw, 1.2rem);
        font-weight: 700;
        letter-spacing: 0.03em;
        text-shadow: 0 2px 12px rgba(0, 0, 0, 0.55);
      }
      .site-title span {
        color: var(--accent);
      }
      header {
        position: fixed;
        top: 10px;
        right: 10px;
        z-index: 40;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.45rem 0.75rem;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--bg-soft);
        backdrop-filter: blur(10px);
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
      }
      header a {
        color: var(--text);
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 0.4rem;
        font-size: 0.82rem;
        font-weight: 500;
      }
      header a img {
        height: 20px;
      }
      .hint {
        position: fixed;
        left: 12px;
        bottom: 12px;
        z-index: 10;
        padding: 0.55rem 0.7rem;
        font-size: 0.72rem;
        color: var(--text-dim);
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--bg-soft-strong);
        backdrop-filter: blur(8px);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
      }
      .hint strong {
        color: var(--text);
        font-weight: 600;
      }
      .hint .key {
        color: var(--accent);
      }
      canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
        background: transparent;
      }
      .canvas-shell {
        position: fixed;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        width: min(80vw, 1400px);
        height: min(80vh, 900px);
        border-radius: 14px;
        overflow: hidden;
        border: 1px solid var(--line);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
        background: #030812;
      }
      .loader {
        position: fixed;
        inset: 0;
        z-index: 30;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(130% 130% at 50% 10%, #10203a 0%, #030812 62%, #01040a 100%);
      }
      .loader-brand {
        position: fixed;
        top: 12px;
        left: 12px;
        margin: 0;
        color: var(--text);
        font-size: clamp(0.9rem, 1.8vw, 1.2rem);
        font-weight: 700;
        letter-spacing: 0.03em;
        text-shadow: 0 2px 12px rgba(0, 0, 0, 0.55);
      }
      .loader-brand span {
        color: var(--accent);
      }
      .loader.hidden {
        opacity: 0;
        pointer-events: none;
        transition: opacity 240ms ease;
      }
      .loader-card {
        min-width: 260px;
        max-width: 86vw;
        padding: 1rem 1.1rem;
        border-radius: 12px;
        border: 1px solid var(--line);
        background: var(--bg-soft-strong);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.42);
        text-align: center;
      }
      .loader-title {
        margin: 0 0 0.5rem;
        color: var(--text);
        font-size: 0.95rem;
        letter-spacing: 0.02em;
      }
      .loader-status {
        margin: 0;
        color: var(--text-dim);
        font-size: 0.8rem;
      }
      .spinner {
        width: 26px;
        height: 26px;
        margin: 0 auto 0.65rem;
        border-radius: 999px;
        border: 2px solid rgba(255, 255, 255, 0.25);
        border-top-color: var(--accent);
        animation: spin 800ms linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      @media (max-width: 720px) {
        .site-title {
          max-width: 66vw;
          line-height: 1.25;
        }
        .canvas-shell {
          width: 94vw;
          height: 82vh;
          border-radius: 10px;
        }
        header {
          top: auto;
          bottom: 10px;
          right: 10px;
          left: auto;
          max-width: 62vw;
        }
        .hint {
          max-width: 60vw;
          font-size: 0.66rem;
        }
      }
    </style>
  </head>
  <body>
    <link
    data-trunk rel="rust"
    href="Cargo.toml"
    data-wasm-opt="z"
    data-wasm-opt-params="--enable-bulk-memory --enable-nontrapping-float-to-int"
    data-bin="vizmat-app"
    data-cargo-no-default-features="true" />
    <link data-trunk rel="copy-dir" href="assets" />
    <h1 class="site-title">vizmat <span>molecule / crystal</span> visual lab</h1>
    <header>
      <a href="https://github.com/rs4rse/vizmat" target="_blank">
        Star on GitHub
        <img src="https://img.shields.io/github/stars/rs4rse/vizmat" alt="GitHub stars">
      </a>
    </header>
    <div class="hint">
      <strong>Doom-like controls:</strong>
      <span class="key">W/A/S/D</span> move,
      <span class="key">Shift</span> sprint,
      <span class="key">Q/E</span> rotate
    </div>
    <div id="app-loader" class="loader" aria-live="polite">
      <p class="loader-brand">vizmat <span>molecule / crystal</span> visual lab</p>
      <div class="loader-card">
        <div class="spinner"></div>
        <p class="loader-title">Loading vizmat</p>
        <p id="loader-status" class="loader-status">Compiling shaders and booting WebAssembly...</p>
      </div>
    </div>
    <div class="canvas-shell">
      <canvas id="bevy-canvas"></canvas>
    </div>
    <script>
      (function () {
        const loader = document.getElementById("app-loader");
        const status = document.getElementById("loader-status");
        if (!loader) return;

        const hideLoader = () => {
          loader.classList.add("hidden");
          window.setTimeout(() => loader.remove(), 260);
        };

        // Trunk injects a startup script and emits this event after WASM init.
        window.addEventListener("TrunkApplicationStarted", hideLoader, { once: true });

        // Fallback so users are not stuck forever if startup event never fires.
        window.setTimeout(() => {
          if (!loader.classList.contains("hidden") && status) {
            status.textContent = "Still loading... first run can take longer.";
          }
        }, 9000);
      })();
    </script>
    <script type="module" src="./index.js"></script>
  </body>
</html>
