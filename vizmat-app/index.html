<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>vizmat: a cross platform crystal visualizer</title>
    <style>
      body {
        margin: 0;
        font-family: sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      header {
        width: 80%; /* header less than full width if desired */
        max-width: 1200px; /* optional max width */
        color: white;
        display: flex;
        justify-content: flex-end; /* push content to the right */
        align-items: center;
        padding: 0.5rem 1rem;
        height: 50px;
        margin-top: 0;
        margin-bottom: 0.5rem;
        box-sizing: border-box;
      }
      header h1 {
        font-size: 0.5rem; /* smaller than before */
        font-weight: 500;
        margin: 0;
        font-family: 'Roboto', sans-serif;
        letter-spacing: 0.5px; /* subtle style */
      }
      header a {
        color: black;
        text-decoration: none;
        display: flex;
        align-items: center;
      }
      header a img {
        height: 24px;
        margin-left: 0.5rem;
      }
      #canvas-container {
        width: 80%; /* same width as header */
        max-width: 1200px;
      }
      canvas {
        width: 100%; /* fill the container */
        height: 80vh; /* or any desired height */
        display: block;
      }
    </style>
  </head>
  <body>
    <link
    data-trunk rel="rust"
    href="Cargo.toml"
    data-wasm-opt="z"
    data-wasm-opt-params="--enable-bulk-memory --enable-nontrapping-float-to-int"
    data-bin="vizmat-app"
    data-cargo-no-default-features="true" />
    <h1>molecule🧬/crystal🧊 visualizer go brrr 👀</h1>
    <header>
      <a href="https://github.com/rs4rse/vizmat" target="_blank">
        like me ──★ ˙🍓 ̟ !!
        <img src="https://img.shields.io/github/stars/rs4rse/vizmat" alt="GitHub stars">
      </a>
    </header>
    <canvas id="bevy-canvas"></canvas>
    <script type="module" src="./index.js"></script>
  </body>
</html>
